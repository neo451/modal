when:
  - event: ["push", "manual"]
    branch: ["main"]
  - event: ["pull_request"]
    branch: ["main"]

engine: "nixery"

clone:
  skip: false
  depth: 1
  submodules: false

dependencies:
  nixpkgs:
    - gnumake
    - gcc
    - luajit
    - luajitPackages.busted
    - luajitPackages.lpeg
    - luajitPackages.luarocks
    - luajitPackages.luasocket
    - luajitPackages.luv
    - luajitPackages.readline
    - selene
    - typos

environment:
  LUA: "lua"
  LUA_PATH: "./?.lua;./?/init.lua;/share/lua/5.1/?.lua;/share/lua/5.1/?/init.lua;;"
  LUA_CPATH: "./?.so;/lib/lua/5.1/?.so;;"

steps:
  - name: "Selene"
    command: "selene --config selene/config.toml src/"

  - name: "Typos"
    command: "typos ."

  - name: "Test"
    command: "make test"
